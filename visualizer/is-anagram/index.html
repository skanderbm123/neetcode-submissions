<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Valid anagram — visualizer</title>
    <link rel="stylesheet" href="../shared/viz.css" />
    <link rel="stylesheet" href="../workbench.css" />
  </head>
  <body>
    <div class="wrap">
      <p class="hub-intro" style="margin: 0 0 0.75rem">
        <a href="../index.html">← Workbench hub</a>
      </p>
      <div id="workbenchRoot"></div>
      <header>
        <h1>Valid anagram</h1>
        <span class="step-badge" id="stepLabel">Step — / —</span>
      </header>

      <div class="toolbar">
        <label>
          s&nbsp;
          <input id="inputS" type="text" value="anagram" spellcheck="false" />
        </label>
        <label>
          t&nbsp;
          <input id="inputT" type="text" value="nagaram" spellcheck="false" />
        </label>
        <button type="button" class="primary" id="btnRun">Run</button>
      </div>

      <div class="panels">
        <div class="row-label">SORTED COPIES (after Arrays.sort style)</div>
        <div class="vars">
          <div class="var-box" style="flex: 1">
            <div class="lbl">SORTED S</div>
            <div class="val" id="sortS" style="font-size: 0.95rem">—</div>
          </div>
          <div class="var-box" style="flex: 1">
            <div class="lbl">SORTED T</div>
            <div class="val" id="sortT" style="font-size: 0.95rem">—</div>
          </div>
        </div>

        <div class="vars">
          <div class="var-box">
            <div class="lbl">INDEX</div>
            <div class="val" id="idxVal">—</div>
          </div>
          <div class="var-box">
            <div class="lbl">ANAGRAM?</div>
            <div class="val" id="resultVal">—</div>
          </div>
        </div>

        <div class="message" id="message"></div>
      </div>

      <div class="controls">
        <input type="range" class="seek" id="seek" min="0" max="0" value="0" />
        <div class="btn-row">
          <button type="button" id="btnPrev">Previous</button>
          <button type="button" id="btnPlay">Play</button>
          <button type="button" id="btnNext">Next</button>
          <span class="speed-toggle" style="margin-left: 0.5rem">
            <span style="font-size: 0.8rem; color: var(--muted)">Speed</span>
            <button type="button" data-speed="1200">0.5x</button>
            <button type="button" data-speed="600">1x</button>
            <button type="button" data-speed="300">2x</button>
          </span>
        </div>
      </div>

      <p class="hint">
        Sort-both-arrays then compare (matches a typical <code>isAnagram</code>
        approach).
      </p>
    </div>

    <script src="../submissions-manifest.js"></script>
    <script src="../fix-suggestions.js"></script>
    <script src="../workbench.js"></script>
    <script src="viz.js"></script>
  </body>
</html>
